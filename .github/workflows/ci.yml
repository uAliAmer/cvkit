name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: stable
      # Fyne (GUI) needs OpenGL + X11 dev headers to compile.
      - name: Install GUI build deps
        run: sudo apt-get update && sudo apt-get install -y libgl1-mesa-dev xorg-dev
      - run: go vet ./...
      - run: go test ./...
      - run: go build ./...
