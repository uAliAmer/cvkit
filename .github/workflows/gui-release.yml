name: GUI Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            ext: ""
          - os: macos-latest
            ext: ""
          - os: windows-latest
            ext: ".exe"
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Install Linux GUI deps
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libgl1-mesa-dev xorg-dev

      - name: Build GUI
        shell: bash
        env:
          CGO_ENABLED: "1"
        run: |
          VERSION="${GITHUB_REF_NAME}"
          go build -ldflags "-s -w" -o "cvkit-gui${{ matrix.ext }}" ./gui
          NAME="cvkit-gui_${VERSION}_$(echo ${{ runner.os }} | tr '[:upper:]' '[:lower:]')_$(echo ${{ runner.arch }} | tr '[:upper:]' '[:lower:]')"
          tar -czf "${NAME}.tar.gz" "cvkit-gui${{ matrix.ext }}"
          echo "ASSET=${NAME}.tar.gz" >> "$GITHUB_ENV"

      - name: Attach to release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ASSET }}
