name: GUI Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: stable
      - name: Build .exe (no console window)
        shell: bash
        run: go build -ldflags "-s -w -H=windowsgui" -o "cvkit-gui_${GITHUB_REF_NAME}_windows_x64.exe" ./gui
      - uses: softprops/action-gh-release@v2
        with:
          files: cvkit-gui_*_windows_x64.exe

  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: stable
      - name: Install deps
        run: sudo apt-get update && sudo apt-get install -y libgl1-mesa-dev xorg-dev
      - name: Build AppImage
        run: |
          set -e
          go build -ldflags "-s -w" -o cvkit-gui ./gui
          mkdir -p AppDir/usr/bin
          cp cvkit-gui AppDir/usr/bin/
          cp gui/icon.png AppDir/cvkit-gui.png
          cp gui/icon.png AppDir/.DirIcon
          cat > AppDir/cvkit-gui.desktop <<'EOF'
          [Desktop Entry]
          Type=Application
          Name=CVKit
          Exec=cvkit-gui
          Icon=cvkit-gui
          Categories=Office;Utility;
          Terminal=false
          EOF
          cat > AppDir/AppRun <<'EOF'
          #!/bin/sh
          HERE="$(dirname "$(readlink -f "$0")")"
          exec "$HERE/usr/bin/cvkit-gui" "$@"
          EOF
          chmod +x AppDir/AppRun
          wget -q https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool-x86_64.AppImage
          ARCH=x86_64 ./appimagetool-x86_64.AppImage --appimage-extract-and-run AppDir "cvkit-gui_${GITHUB_REF_NAME}_x86_64.AppImage"
      - uses: softprops/action-gh-release@v2
        with:
          files: cvkit-gui_*_x86_64.AppImage

  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: stable
      - name: Build .app bundle
        run: |
          set -e
          go build -ldflags "-s -w" -o cvkit-gui ./gui
          APP=CVKit.app
          mkdir -p "$APP/Contents/MacOS" "$APP/Contents/Resources"
          cp cvkit-gui "$APP/Contents/MacOS/cvkit-gui"
          # icon: png -> icns
          mkdir icon.iconset
          for s in 16 32 128 256 512; do
            sips -z $s $s gui/icon.png --out "icon.iconset/icon_${s}x${s}.png" >/dev/null
            d=$((s*2)); sips -z $d $d gui/icon.png --out "icon.iconset/icon_${s}x${s}@2x.png" >/dev/null
          done
          iconutil -c icns icon.iconset -o "$APP/Contents/Resources/icon.icns"
          cat > "$APP/Contents/Info.plist" <<'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0"><dict>
            <key>CFBundleName</key><string>CVKit</string>
            <key>CFBundleDisplayName</key><string>CVKit</string>
            <key>CFBundleExecutable</key><string>cvkit-gui</string>
            <key>CFBundleIdentifier</key><string>com.ualiamer.cvkit</string>
            <key>CFBundleIconFile</key><string>icon.icns</string>
            <key>CFBundlePackageType</key><string>APPL</string>
            <key>NSHighResolutionCapable</key><true/>
          </dict></plist>
          EOF
          ZIP="cvkit-gui_${GITHUB_REF_NAME}_macos_arm64.zip"
          ditto -c -k --keepParent "$APP" "$ZIP"
      - uses: softprops/action-gh-release@v2
        with:
          files: cvkit-gui_*_macos_arm64.zip
